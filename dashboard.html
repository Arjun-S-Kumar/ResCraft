<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResCraft - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
    <script src="login-script.js"></script>
    <script src="script.js"></script>
    <link rel="icon" href="Logo/SRA_Logo.ico">
    <script>
        if (!JSON.parse(localStorage.getItem('resumeMakerSession'))) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <div class="nav">
        <div class="user-info">
            <span id="userName"></span>
            <button id="colorToggle" class="navbtn color-toggle-btn" title="Change Theme"><i class="fas fa-palette"></i></button>
            <button onclick="logout()" class="navbtn logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
        </div>

        <div id="colorSelector" class="color-selector hidden">
            <div class="color-selector-title">Choose Theme</div>
            <div class="color-options">
                <button class="color-option" data-theme="purple" title="Purple Theme" onclick="changeTheme('purple')">
                    <span class="color-swatch" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></span>
                    <span class="color-name">Purple</span>
                </button>
                <button class="color-option" data-theme="blue" title="Blue Theme" onclick="changeTheme('blue')">
                    <span class="color-swatch" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></span>
                    <span class="color-name">Blue</span>
                </button>
                <button class="color-option" data-theme="green" title="Green Theme" onclick="changeTheme('green')">
                    <span class="color-swatch" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);"></span>
                    <span class="color-name">Green</span>
                </button>
                <button class="color-option" data-theme="pink" title="Pink Theme" onclick="changeTheme('pink')">
                    <span class="color-swatch" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);"></span>
                    <span class="color-name">Pink</span>
                </button>
                <button class="color-option" data-theme="orange" title="Orange Theme" onclick="changeTheme('orange')">
                    <span class="color-swatch" style="background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);"></span>
                    <span class="color-name">Orange</span>
                </button>
                <button class="color-option" data-theme="teal" title="Teal Theme" onclick="changeTheme('teal')">
                    <span class="color-swatch" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);"></span>
                    <span class="color-name">Teal</span>
                </button>
                <button class="color-option" data-theme="indigo" title="Indigo Theme" onclick="changeTheme('indigo')">
                    <span class="color-swatch" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></span>
                    <span class="color-name">Indigo</span>
                </button>
                <button class="color-option" data-theme="red" title="Red Theme" onclick="changeTheme('red')">
                    <span class="color-swatch" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></span>
                    <span class="color-name">Red</span>
                </button>
                <div class="color-option custom-color-option" data-theme="custom" title="Custom Theme">
                    <span class="color-swatch custom-swatch" id="customSwatch" style="background: #667eea;"></span>
                    <input type="color" id="customThemeColor" value="#667eea" onchange="updateCustomSwatch(this.value)">
                    <span class="color-name">Custom</span>
                    <button type="button" class="custom-theme-button" onclick="applyCustomTheme()">Apply</button>
                </div>
            </div>
        </div>

        <button class="navbtn edit-btn" onclick="window.location.href='index.html'" title="Edit Resume"><i class="fas fa-edit"></i></button>
        <button class="navbtn home-btn" onclick="window.location.href='index.html'" title="Home"><i class="fas fa-home"></i></button>
    </div>

    <div class="dashboard">
        <div class="dashboard-header">
            <h2>Your Saved Resumes</h2>
            <p>Edit or delete any saved resume. Click Edit to open the selected resume in the editor.</p>
        </div>
        <div id="savedResumesList" class="saved-resumes-list">
            <p class="empty-message">Loading saved resumes...</p>
        </div>
    </div>
</body>
</html>
