<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResCraft - Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Logo/SRA_Logo.ico">
    <script>
        // Check authentication on page load
        if (!JSON.parse(localStorage.getItem('resumeMakerSession'))) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">Change Password</h1>
                <p class="login-subtitle">Enter your current password and choose a new one.</p>
            </div>

            <div class="login-form active-form">
                <form onsubmit="handleChangePassword(event)">
                    <div class="form-group">
                        <label for="currentPassword" class="form-label">Current Password</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="currentPassword" class="form-control login-input" placeholder="Enter your current password" required>
                            <span class="toggle-password" onclick="togglePassword('currentPassword')"><i class="fas fa-eye"></i></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="newPassword" class="form-label">New Password</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="newPassword" class="form-control login-input" placeholder="Enter a new password" required>
                            <span class="toggle-password" onclick="togglePassword('newPassword')"><i class="fas fa-eye"></i></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="confirmNewPassword" class="form-control login-input" placeholder="Confirm your new password" required>
                            <span class="toggle-password" onclick="togglePassword('confirmNewPassword')"><i class="fas fa-eye"></i></span>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">Change Password</button>
                </form>

                <div class="form-footer">
                    <p><a href="index.html" class="toggle-link">Back to Dashboard</a></p>
                </div>
            </div>

            <div id="alertMessage" class="alert alert-danger alert-dismissible fade" role="alert" style="display: none;">
                <span id="alertText"></span>
                <button type="button" class="btn-close" onclick="closeAlert()" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="login-script.js"></script>
</body>
</html>
