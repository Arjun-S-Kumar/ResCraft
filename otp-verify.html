<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResCraft - Password Reset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Logo/SRA_Logo.ico">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">Password Reset</h1>
                <p class="login-subtitle">Enter the verification code sent to your email and choose a new password.</p>
            </div>

            <div class="login-form active-form">
                <form onsubmit="handleOtpReset(event)">
                    <div class="form-group">
                        <label for="resetEmail" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-envelope"></i></span>
                            <input type="email" id="resetEmail" class="form-control login-input" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="otpCode" class="form-label">Verification Code</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-key"></i></span>
                            <input type="text" id="otpCode" class="form-control login-input" placeholder="Enter the 6-digit verification code" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="newPassword" class="form-label">New Password</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="newPassword" class="form-control login-input" placeholder="Create a new password" required>
                            <span class="toggle-password" onclick="togglePassword('newPassword')"><i class="fas fa-eye"></i></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmNewPassword" class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="confirmNewPassword" class="form-control login-input" placeholder="Confirm new password" required>
                            <span class="toggle-password" onclick="togglePassword('confirmNewPassword')"><i class="fas fa-eye"></i></span>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">Reset Password</button>
                </form>

                <div class="form-footer">
                    <p>Back to <a href="login.html" class="toggle-link">Login</a></p>
                </div>
            </div>

            <div id="alertMessage" class="alert alert-danger alert-dismissible fade" role="alert" style="display: none;">
                <span id="alertText"></span>
                <button type="button" class="btn-close" onclick="closeAlert()" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="login-script.js"></script>
</body>
</html>
