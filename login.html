<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Maker - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Logo/SRA_Logo.ico">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">ResCraft</h1>
                <p class="login-subtitle">Create your professional resume</p>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="login-form active-form">
                <h2 class="form-title">Welcome Back</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-envelope"></i></span>
                            <input type="email" id="loginEmail" class="form-control login-input" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="loginPassword" class="form-control login-input" placeholder="Enter your password" required>
                            <span class="toggle-password" onclick="togglePassword('loginPassword')"><i class="fas fa-eye"></i></span>
                        </div>
                    </div>

                    <div class="remember-forgot">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                </form>

                <div class="form-divider">
                    <span>or</span>
                </div>

                <button type="button" class="social-btn google-btn">
                    <i class="fab fa-google"></i> Login with Google
                </button>

                <div class="form-footer">
                    <p>Don't have an account? <a href="#" onclick="toggleForms(event)" class="toggle-link">Sign up</a></p>
                </div>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="login-form">
                <h2 class="form-title">Create Account</h2>
                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="signupName" class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-user"></i></span>
                            <input type="text" id="signupName" class="form-control login-input" placeholder="Enter your full name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="signupEmail" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-envelope"></i></span>
                            <input type="email" id="signupEmail" class="form-control login-input" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="signupPassword" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="signupPassword" class="form-control login-input" placeholder="Create a password" required>
                            <span class="toggle-password" onclick="togglePassword('signupPassword')"><i class="fas fa-eye"></i></span>
                        </div>
                        <small class="password-hint">At least 6 characters</small>
                    </div>

                    <div class="form-group">
                        <label for="signupConfirmPassword" class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-icon"><i class="fas fa-lock"></i></span>
                            <input type="password" id="signupConfirmPassword" class="form-control login-input" placeholder="Confirm your password" required>
                            <span class="toggle-password" onclick="togglePassword('signupConfirmPassword')"><i class="fas fa-eye"></i></span>
                        </div>
                    </div>

                    <div class="terms-check">
                        <label class="checkbox-label">
                            <input type="checkbox" id="termsAgree" required>
                            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                        </label>
                    </div>

                    <button type="submit" class="login-btn signup-btn">Create Account</button>
                </form>

                <div class="form-divider">
                    <span>or</span>
                </div>

                <button type="button" class="social-btn google-btn">
                    <i class="fab fa-google"></i> Sign up with Google
                </button>

                <div class="form-footer">
                    <p>Already have an account? <a href="#" onclick="toggleForms(event)" class="toggle-link">Login</a></p>
                </div>
            </div>

            <div id="alertMessage" class="alert alert-danger alert-dismissible fade" role="alert" style="display: none;">
                <span id="alertText"></span>
                <button type="button" class="btn-close" onclick="closeAlert()" aria-label="Close"></button>
            </div>
        </div>

        <div class="login-info">
            <h3>Why use ResCraft?</h3>
            <ul>
                <li><i class="fas fa-check-circle"></i> Easy to use interface</li>
                <li><i class="fas fa-check-circle"></i> Professional templates</li>
                <li><i class="fas fa-check-circle"></i> Download as PDF</li>
                <li><i class="fas fa-check-circle"></i> Save your work</li>
            </ul>
        </div>
    </div>

    <script src="login-script.js"></script>
</body>
</html>
